name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --check

  # Fast feedback — exits within ~3 min on a warm cache.
  check:
    name: cargo check (ssr + hydrate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # `mold` is pinned by `.cargo/config.toml` for Linux-GNU targets.
      # ubuntu-latest has it in apt; install before any cargo invocation.
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: check
      - name: cargo check --workspace
        run: cargo check --workspace --locked
      - name: cargo check -p eigenpulse --features ssr
        run: cargo check -p eigenpulse --features ssr --no-default-features --locked
      - name: cargo check -p eigenpulse (wasm32, hydrate)
        run: cargo check -p eigenpulse --lib --target wasm32-unknown-unknown --features hydrate --no-default-features --locked
      - name: hydrate dependency guard
        run: |
          cargo tree -p eigenpulse --target wasm32-unknown-unknown --features hydrate --no-default-features --edges normal --locked > hydrate-tree.txt
          if grep -E '(^|[[:space:]])(sqlx|reqwest|lettre|argon2|axum|tokio) v[0-9]' hydrate-tree.txt; then
            echo "SSR-only dependency leaked into the wasm32 hydrate graph"
            exit 1
          fi
      - name: cargo check password reset example
        run: cargo check -p ep-auth --features ssr --example reset_password --locked
      - name: cargo check no-default leaf crates
        run: |
          for pkg in ep-core ep-db ep-ui ep-marketplace ep-finance ep-fitness ep-learning ep-i18n ep-api ep-auth ep-notify; do
            cargo check -p "$pkg" --no-default-features --locked
          done
      - name: static asset and shortcut syntax
        run: |
          node --check assets/sw.js
          node --check assets/theme-init.js
          sh -n wasm-opt-shim.sh
          printf 'wasm' > /tmp/ep-test.wasm
          sh wasm-opt-shim.sh -Oz /tmp/ep-test.wasm -o /tmp/ep-test-out.wasm
          cmp /tmp/ep-test.wasm /tmp/ep-test-out.wasm
          if sh wasm-opt-shim.sh -Oz /tmp/ep-missing.wasm -o /tmp/ep-test-out.wasm; then
            echo "wasm-opt-shim unexpectedly accepted a missing input"
            exit 1
          fi
          bash -n examples/shortcuts/test.sh
          python3 -m json.tool examples/shortcuts/quick-expense.json > /dev/null
          python3 -m json.tool examples/shortcuts/quick-notify.json > /dev/null

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: cargo clippy -p eigenpulse --features ssr
        run: cargo clippy -p eigenpulse --features ssr --no-default-features --all-targets --locked -- -D warnings
      - name: cargo clippy SSR leaf crates
        run: cargo clippy -p ep-core -p ep-db -p ep-ui -p ep-marketplace -p ep-finance -p ep-fitness -p ep-learning -p ep-i18n -p ep-api -p ep-auth -p ep-notify --features ssr --no-default-features --all-targets --locked -- -D warnings

  # Tests across the workspace plus SSR-only harnesses that default
  # workspace features do not exercise. app/tests/smoke.rs is still
  # reserved for the `smoke` job below because it needs cargo-leptos.
  unit-tests:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: tests
      - name: cargo test --workspace
        run: cargo test --workspace --locked
      - name: cargo test SSR module unit tests
        run: |
          cargo test -p ep-api --lib --features ssr --no-default-features --locked
          cargo test -p ep-auth --lib --features ssr --no-default-features --locked
          cargo test -p ep-db --lib --features ssr --no-default-features --locked
          cargo test -p ep-finance --lib --features ssr --no-default-features --locked
          cargo test -p ep-fitness --lib --features ssr --no-default-features --locked
          cargo test -p ep-learning --lib --features ssr --no-default-features --locked
      - name: cargo test SSR binary unit tests
        run: cargo test -p eigenpulse --features ssr --no-default-features --bin eigenpulse --locked
      - name: cargo test finance CRUD integration
        run: cargo test -p ep-finance --features ssr --no-default-features --test crud --locked

  # End-to-end smoke against the SSR binary. Builds the full leptos site
  # (SSR binary + wasm hydrate bundle), then the smoke test spawns the
  # binary, verifies the `/pkg/<name>_bg.wasm` alias is served (by the
  # ServeDir fallback in main.rs), and walks login -> dashboard -> PAT 401.
  smoke:
    name: cargo leptos build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke
      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked --version 0.3.6
      - name: Cargo Leptos build (release)
        run: cargo leptos build --release
      - name: Smoke test
        run: cargo test --features ssr -p eigenpulse --test smoke --release --no-default-features --locked

  # Real-browser end-to-end hydration suite (playwright/). This is the only
  # guard that catches a CSP / hydration footgun that degrades every page to a
  # dead SSR snapshot — a bug class the compile / clippy / unit / HTTP-smoke
  # jobs all miss because it is only observable in a browser executing the
  # hydrate WASM. Slow (full leptos build + Chromium), so it is its own job and
  # runs on the same push/PR triggers as the rest. Builds the leptos site here,
  # then `global-setup.ts` skips its own build (EP_SKIP_BUILD=1) and the
  # webServer boots the freshly built binary.
  e2e:
    name: playwright e2e (hydration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: smoke
      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked --version 0.3.6
      - name: Cargo Leptos build (release)
        run: cargo leptos build --release
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install npm deps
        working-directory: playwright
        # No lockfile is committed (it is .gitignored), so `npm install`. If a
        # maintainer later commits playwright/package-lock.json, switch this to
        # `npm ci` and add `cache: npm` to the setup-node step above.
        run: npm install --no-audit --no-fund
      - name: Install Playwright Chromium
        working-directory: playwright
        run: npx playwright install --with-deps chromium
      - name: Playwright type-check
        working-directory: playwright
        run: npx tsc --noEmit
      - name: Run Playwright suite
        working-directory: playwright
        # The site is already built above; skip global-setup's own build.
        env:
          EP_SKIP_BUILD: "1"
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/playwright-report/
          retention-days: 7

  # cargo-deny: advisories (RUSTSEC vulns + unmaintained), banned/duplicate
  # crates, license allow-list, and registry sources. Config in deny.toml at
  # the repo root. advisories+bans+sources are hard failures; license is an
  # allow-list (also hard) kept in sync with the lock graph. Does not need the
  # mold linker or a full build — it only resolves the dependency graph.
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check

  # Verify the Dockerfile actually produces a runnable image. arm64 is the real
  # NAS deployment target and exercises the wasm-opt shim + mold workarounds in
  # the Dockerfile that only matter under emulation, so we build BOTH arches via
  # buildx + QEMU. PR/push CI is build-only (`push: false`) — no registry. The
  # multi-platform build cannot `load:` into the local docker daemon (it can
  # only hold a single-arch image), so the runnable healthz probe below does a
  # second, amd64-only build with `load: true` and runs the container natively;
  # running an arm64 container on an amd64 runner would require qemu user
  # emulation for the whole process lifetime, which is slow and flaky for a
  # health probe, so the probe stays amd64-only.
  docker:
    name: docker build (amd64 + arm64)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image (amd64 + arm64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          tags: eigenpulse:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build amd64 image for local probe
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          tags: eigenpulse:ci-amd64
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Probe healthz (amd64, native)
        run: |
          docker run -d --name ep-ci -p 3000:3000 \
            -e EP_ADMIN_PASSWORD='ci-test-pw' \
            eigenpulse:ci-amd64
          for i in $(seq 1 20); do
            status="$(docker inspect -f '{{.State.Health.Status}}' ep-ci 2>/dev/null || true)"
            if [ "$status" = "healthy" ] && curl -fsS -m 2 http://127.0.0.1:3000/healthz > /dev/null; then
              echo "container healthcheck and host /healthz OK on attempt $i"
              docker rm -f ep-ci
              exit 0
            fi
            sleep 1
          done
          echo "container healthcheck never became healthy"
          docker inspect -f '{{json .State.Health}}' ep-ci || true
          docker logs ep-ci || true
          docker rm -f ep-ci
          exit 1
